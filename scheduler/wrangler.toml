# Cloudflare Worker that is the collector's real scheduler (free plan).
# GitHub's `schedule` trigger is best-effort and silently drops fires under
# load (observed on this repo: a */30 cron firing once every 1-3 hours), while
# workflow_dispatch calls deterministically create a run — so this Worker's
# crons dispatch the workflows via the GitHub API instead. The GH crons that
# remain in the workflows are only degraded-mode backstops.
#
# Deploy / iterate:  cd scheduler && npx wrangler deploy
# Secret (once):     npx wrangler secret put GITHUB_TOKEN
# Live logs:         npx wrangler tail
# See README.md for the full step-by-step setup.

name = "pou-collector-scheduler"
main = "src/index.ts"
compatibility_date = "2026-07-01"

# Two independent cron triggers; src/index.ts branches on which one fired
# (event.cron), so their expressions must stay in sync with the constants there.
#
#   ROSTER tick  — :00/:30, dispatches build-roster unconditionally. Hard rule
#                  of the pipeline: the roster capture must never be skipped.
#   COLLECT tick — every 10 min, offset so it never coincides with a roster
#                  tick. Skipped while a build-roster or new-snapshot run is
#                  queued/active (priority: roster + new-snapshot before
#                  collect). To try a different collect cadence, edit ONLY this
#                  second expression (keep it off :00/:30) and redeploy; the
#                  in-collector collectCooldownMinutes gate keeps aggregate GGG
#                  load bounded no matter how frequent the ticks are.
[triggers]
crons = [
  "0,30 * * * *",
  "5,15,25,35,45,55 * * * *",
]

[vars]
GITHUB_REPO = "classOlek/pou-collector"
# Branch the dispatched workflows run from (workflow files must exist on it).
GIT_REF = "main"

# The GITHUB_TOKEN secret (fine-grained PAT, Actions read+write on the repo
# above) is NOT set here — secrets never live in this file. Set it with:
#   npx wrangler secret put GITHUB_TOKEN
